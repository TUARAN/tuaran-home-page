name: 反馈与建议
description: 页面问题、内容纠错、体验建议或新功能想法
title: "[Feedback] "
labels:
  - feedback
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈。请不要在 Issue 中提交 API key、token、密码、私人联系方式或其他敏感信息。
  - type: dropdown
    id: type
    attributes:
      label: 类型
      options:
        - 页面 Bug
        - 内容纠错
        - 体验建议
        - 新功能想法
        - 部署 / 文档问题
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: 相关页面
      description: 如果和具体页面有关，请贴出 URL。
      placeholder: https://2aran.com/...
  - type: textarea
    id: description
    attributes:
      label: 说明
      description: 请描述你看到的问题、建议或预期行为。
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 如果是 Bug，请写出如何复现。
      placeholder: |
        1. 打开 ...
        2. 点击 ...
        3. 看到 ...
  - type: textarea
    id: environment
    attributes:
      label: 环境信息
      description: 如果是页面显示或交互问题，请填写浏览器、设备、系统版本等信息。
      placeholder: Chrome / Safari, macOS / iOS / Android, desktop / mobile
