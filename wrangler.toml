name = "tuaran-me"
compatibility_date = "2026-01-07"
compatibility_flags = ["nodejs_compat"]

# Cloudflare Pages expects the built static assets here when using next-on-pages.
pages_build_output_dir = ".vercel/output/static"

# 2026 世界杯页面 (/agent-world-cup) 定时采集
# 端点 app/api/wc/collect/route.js (Edge),数据源 openfootball/worldcup.json (无 key、无限流)。
# 注意: Cloudflare Pages 不支持 cron triggers([triggers] 会被 Pages 配置校验拒绝),
# 定时改由外部调度器每 3 小时 POST /api/wc/collect (带 x-wc-secret) 触发。详见 private/wc-deploy.md。

[vars]
GITHUB_ID = "Ov23li1wLMVXeIzcprTU"
NEXTAUTH_URL = "https://2aran.com"
VOICE_TASK_OWNER_IDS = "TUARAN"
# 壁纸资源库公开访问基址（当前使用 tuaran-media 的 r2.dev 公开 URL，末尾不带斜杠）。
# 若后续绑定 media.2aran.com，自定义域生效后把这里替换为 https://media.2aran.com。
R2_PUBLIC_BASE = "https://pub-09012f26768b4d39908a8a574af8fde1.r2.dev"
# 2026 世界杯数据源:openfootball/worldcup.json (无 key、无限流)。
# 采集只需 D1 binding;手动触发鉴权用的 WC_COLLECT_SECRET 走 Secret,不在这里。
WC_DATA_SOURCE = "openfootball"
# 舆情采集端点鉴权使用 PUBLIC_OPINION_COLLECT_SECRET。
# 该值必须作为 Cloudflare Secret 配置，不要写入本文件。

# Used for D1 migrations / local development.
# In Cloudflare Pages, you can also set the D1 binding in the dashboard.

[[d1_databases]]
binding = "DB"
database_name = "tuaran-me"
database_id = "9dd9a699-a708-46ca-8243-85fd12ff8d63"

# 壁纸/可下载文件存储桶。所有对象落在 downloads/ 前缀下。
# 在 Cloudflare Pages 控制台也可设置同名 R2 binding。
[[r2_buckets]]
binding = "MEDIA"
bucket_name = "tuaran-media"
